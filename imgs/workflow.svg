<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">大客户销售面试准备流程动画</title>
  <desc id="desc">从简历和岗位输入，到证据匹配、针对性准备、模拟面试和反馈改进的循环流程。</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F8FF"/>
      <stop offset="100%" stop-color="#EEF8F3"/>
    </linearGradient>
    <linearGradient id="active" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#15324B" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8AA0B7"/>
    </marker>
    <style>
      .title { font: 700 30px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #15324B; }
      .subtitle { font: 400 16px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #50677C; }
      .step-title { font: 700 19px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #15324B; }
      .step-text { font: 400 14px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #50677C; }
      .number { font: 700 17px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: white; text-anchor: middle; dominant-baseline: central; }
      .card { fill: white; stroke: #C9D6E2; stroke-width: 1.5; }
      .pulse { opacity: 0; }
      #p1 { animation: pulse 10s infinite 0s; }
      #p2 { animation: pulse 10s infinite 2s; }
      #p3 { animation: pulse 10s infinite 4s; }
      #p4 { animation: pulse 10s infinite 6s; }
      #p5 { animation: pulse 10s infinite 8s; }
      @keyframes pulse {
        0%, 18% { opacity: 1; }
        20%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#background)"/>
  <text x="600" y="48" class="title" text-anchor="middle">把“我该怎么准备”变成一条可执行的证据链</text>
  <text x="600" y="77" class="subtitle" text-anchor="middle">简历事实 → 岗位要求 → 公司产品 → 面试表达 → 真实反馈</text>

  <g stroke="#8AA0B7" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M230 195 H270"/>
    <path d="M450 195 H490"/>
    <path d="M670 195 H710"/>
    <path d="M890 195 H930"/>
  </g>

  <g transform="translate(50 120)" filter="url(#shadow)">
    <rect width="180" height="150" rx="18" class="card"/>
    <circle cx="28" cy="28" r="18" fill="#2563EB"/>
    <text x="28" y="28" class="number">1</text>
    <text x="90" y="61" class="step-title" text-anchor="middle">输入材料</text>
    <text x="90" y="93" class="step-text" text-anchor="middle">简历、岗位说明</text>
    <text x="90" y="117" class="step-text" text-anchor="middle">公司与面试阶段</text>
    <rect id="p1" x="3" y="3" width="174" height="144" rx="16" fill="none" stroke="url(#active)" stroke-width="5" class="pulse"/>
  </g>

  <g transform="translate(270 120)" filter="url(#shadow)">
    <rect width="180" height="150" rx="18" class="card"/>
    <circle cx="28" cy="28" r="18" fill="#2563EB"/>
    <text x="28" y="28" class="number">2</text>
    <text x="90" y="61" class="step-title" text-anchor="middle">证据匹配</text>
    <text x="90" y="93" class="step-text" text-anchor="middle">事实、推断、未知</text>
    <text x="90" y="117" class="step-text" text-anchor="middle">权重、置信度、缺口</text>
    <rect id="p2" x="3" y="3" width="174" height="144" rx="16" fill="none" stroke="url(#active)" stroke-width="5" class="pulse"/>
  </g>

  <g transform="translate(490 120)" filter="url(#shadow)">
    <rect width="180" height="150" rx="18" class="card"/>
    <circle cx="28" cy="28" r="18" fill="#0F766E"/>
    <text x="28" y="28" class="number">3</text>
    <text x="90" y="61" class="step-title" text-anchor="middle">针对性准备</text>
    <text x="90" y="93" class="step-text" text-anchor="middle">简历、自我介绍</text>
    <text x="90" y="117" class="step-text" text-anchor="middle">理论、产品、行业</text>
    <rect id="p3" x="3" y="3" width="174" height="144" rx="16" fill="none" stroke="url(#active)" stroke-width="5" class="pulse"/>
  </g>

  <g transform="translate(710 120)" filter="url(#shadow)">
    <rect width="180" height="150" rx="18" class="card"/>
    <circle cx="28" cy="28" r="18" fill="#0F766E"/>
    <text x="28" y="28" class="number">4</text>
    <text x="90" y="61" class="step-title" text-anchor="middle">模拟面试</text>
    <text x="90" y="93" class="step-text" text-anchor="middle">逐题回答与追问</text>
    <text x="90" y="117" class="step-text" text-anchor="middle">评分、改写、复盘</text>
    <rect id="p4" x="3" y="3" width="174" height="144" rx="16" fill="none" stroke="url(#active)" stroke-width="5" class="pulse"/>
  </g>

  <g transform="translate(930 120)" filter="url(#shadow)">
    <rect width="220" height="150" rx="18" class="card"/>
    <circle cx="28" cy="28" r="18" fill="#7C3AED"/>
    <text x="28" y="28" class="number">5</text>
    <text x="110" y="61" class="step-title" text-anchor="middle">匿名反馈改进</text>
    <text x="110" y="93" class="step-text" text-anchor="middle">用户同意与隐私最小化</text>
    <text x="110" y="117" class="step-text" text-anchor="middle">合成案例回归测试</text>
    <rect id="p5" x="3" y="3" width="214" height="144" rx="16" fill="none" stroke="url(#active)" stroke-width="5" class="pulse"/>
  </g>

  <text x="600" y="322" class="subtitle" text-anchor="middle">动画每两秒突出一个阶段；若平台禁用动画，仍可作为完整静态流程图阅读。</text>
</svg>
